name: Build and Test Soroban Contract

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
        
      - name: Build Contract
        working-directory: contracts/budget-enforcer
        run: stellar contract build
        
      - name: Run Tests
        working-directory: contracts/budget-enforcer
        run: cargo test
        
      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-enforcer-wasm
          path: contracts/budget-enforcer/target/wasm32-unknown-unknown/release/budget_enforcer.wasm

  deploy-testnet:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: testnet
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download WASM Artifact
        uses: actions/download-artifact@v4
        with:
          name: budget-enforcer-wasm
          path: ./wasm
          
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
        
      - name: Configure Network
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"
            
      - name: Deploy Contract
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_DEPLOYER_SECRET }}
        run: |
          echo "Deploying to testnet..."
          # stellar contract deploy --wasm ./wasm/budget_enforcer.wasm --network testnet
          echo "Deploy step placeholder - configure secrets first"
